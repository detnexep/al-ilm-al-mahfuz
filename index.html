<!DOCTYPE html>
<html>
<head>
  <title>Al Ilm Al Mahfuz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #books {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .book {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin: 10px;
      width: 220px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: white;
      background: green;
      padding: 8px 12px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>📚 Al Ilm Al Mahfuz</h1>
  <p>Islamic Book Archive</p>

  <div id="books"></div>

  <script>
    fetch('books.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('books');

        data.forEach(book => {
          const div = document.createElement('div');
          div.className = "book";

          div.innerHTML = `
            <h3>${book.title}</h3>
            <p>${book.author}</p>
            <a href="${book.link}" target="_blank">Read Book</a>
          `;

          container.appendChild(div);
        });
      });
  </script>

</body>
</html>
